# Configuración de ejemplo para Zimbra Carbonio MR Sync
# NOTA: Copia este archivo a config.conf y completa con tus valores

# Servidor origen
SOURCE_HOST=source.ejemplo.com
SOURCE_USER=admin@ejemplo.com
SOURCE_PASSWORD=tu_password_aqui

# Servidor destino
DEST_HOST=dest.ejemplo.com
DEST_USER=admin@ejemplo.com
DEST_PASSWORD=tu_password_aqui

# Opciones de migración
# MIGRATION_TYPE=full|incremental
MIGRATION_TYPE=full

# Buzones a migrar (separados por coma o * para todos)
MAILBOXES=user1,user2,user3
